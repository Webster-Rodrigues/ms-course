spring:
  application:
    name: mscloudgateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true # Habilita o roteamento dinâmico baseado na descoberta de serviços
              lower-case-service-id: true # Converte os IDs dos serviços para minúsculas
server:
    port: 8080

eureka:
    client:
      fetch-registry: true # Habilita a busca de serviços registrados no Eureka
      register-with-eureka: true # Registra o gateway no Eureka
      service-url:
        defaultZone: http://localhost:8761/eureka # URL do servidor Eureka